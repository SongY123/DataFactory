server:
  host: 127.0.0.1
  port: 8888

database:
  sql_dir: "src/web/resources/db/migrations"
  db_path: "datafactory.db"

auth:
  auto_login_as_user: true

dataset:
  base_path: "uploads"

logging:
  level: INFO
  file_path: "logs/app.log"
  max_file_size_mb: 10
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(pathname)s:%(lineno)d - %(levelname)s - %(message)s"
  console: true

workspace:
  base_path: "workspace"

synthesis:
  output_paths:
    - key: "default"
      label: "Default Output"
      path: "output"
      default: true
    - key: "staging"
      label: "Staging Output"
      path: "output/staging"
    - key: "archive"
      label: "Archive Output"
      path: "output/archive"

model:
  provider: "ollama"
  ollama:
    model_name: "qwen3-coder:30b-a3b-fp16"
    host: "10.132.80.119:11434"
    stream: true
    keep_alive: "5m"
    enable_thinking: false  # 启用 Qwen3 的 thinking 功能
  dashscope:
    model_name: "qwen-max"
    api_key: "sk-68b2b9b505124a5db93109bee816a33e"
    stream: true
    enable_thinking: false
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

agent:
  models:
    - gpt-4o-mini
    - gpt-4.1-mini
    - deepseek-chat
    - qwen-max
  llm:
    endpoint: ""
    api_key: ""
    timeout_seconds: 60
  file:
    max_parse_seconds: 25
    max_text_chars: 12000
    sample_rows: 6
    pdf_max_pages: 20
    docx_max_paragraphs: 120
    docx_max_tables: 12
    xlsx_max_sheets: 12
